<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TripSocial Comboio</title>
    <!-- Web Font: Inter (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffaa00">
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- SockJS and Stomp via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="theme-blackout">
    
    <div id="offline-banner" class="hidden">
        ⚠️ SINAL PERDIDO - MODO SEGURO ATIVO
    </div>

    <!-- MAIN DASHBOARD -->
    <main class="dashboard">
        
        <!-- Header (Radar Simples) -->
        <header class="radar-panel section-panel">
            <div class="radar-status">
                <div class="pulse-indicator online" id="conn-indicator"></div>
                <h1 id="radar-title">Comboio: <span id="convoy-name">Líder Gurgel</span></h1>
            </div>
            
            <div class="stats-row">
                <div class="stat-box">
                    <span class="label">CARROS CONECTADOS</span>
                    <span class="value" id="cars-count">1 / 4</span>
                </div>
                <div class="stat-box text-right">
                    <span class="label">DISTÂNCIA MÉDIA</span>
                    <span class="value" id="dist-value">-- km</span>
                </div>
            </div>
            
            <div class="mini-map-zone" id="map-mock">
                <div class="car-dot my-car">Eu</div>
                <!-- Outros carros renderizados dinamicamente pelo JS -->
            </div>
        </header>

        <!-- Push To Talk Central -->
        <section class="ptt-container">
            <button id="btn-ptt" class="btn-massive-circle">
                <svg viewBox="0 0 24 24" fill="none" class="icon-mic" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <br/>SEGURE PARA<br/>FALAR
            </button>
        </section>

        <!-- Ações do Motorista (Blind Tap) -->
        <section class="actions-panel">
            <button class="btn-danger btn-block" id="btn-hazard">
                ⚠️ ALERTA NA VIA
            </button>
            <button class="btn-secondary btn-block" id="btn-stop">
                🅿️ SUGERIR PARADA
            </button>
        </section>

    </main>

    <script src="/js/app.js"></script>
    <script src="/js/websocket-client.js"></script>
</body>
</html>
